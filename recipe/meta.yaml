{% set version = "0.10.3" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-immunarch
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/immunarch_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/immunarch/immunarch_{{ version }}.tar.gz
  sha256: e800ff59fdb418e8bedcc9199ac4414599ff764958c124e969c27dc7b40369a2

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-rcpp >=1.0
    - r-airr
    - r-ape
    - r-checkmate
    - r-circlize
    - r-cli
    - r-data.table >=1.12.6
    - r-dbplyr
    - r-doparallel
    - r-dplyr
    - r-dtplyr >=1.0.0
    - r-duckplyr >=1.1.2
    - r-ggplot2 >=3.1.0
    - r-ggsci
    - r-ggthemes
    - r-glue
    - r-immundata >=0.0.5
    - r-lifecycle
    - r-magrittr
    - r-patchwork
    - r-pheatmap >=1.0.12
    - r-plyr
    - r-purrr
    - r-readr
    - r-reshape2 >=1.4.2
    - r-rlang
    - r-rlist
    - r-scales
    - r-stringdist
    - r-stringr
    - r-tibble
    - r-tidyr
    - r-tidyselect
    - r-vctrs
  run:
    - r-base
    - r-rcpp >=1.0
    - r-airr
    - r-ape
    - r-checkmate
    - r-circlize
    - r-cli
    - r-data.table >=1.12.6
    - r-dbplyr
    - r-doparallel
    - r-dplyr
    - r-dtplyr >=1.0.0
    - r-duckplyr >=1.1.2
    - r-ggplot2 >=3.1.0
    - r-ggsci
    - r-ggthemes
    - r-glue
    - r-immundata >=0.0.5
    - r-lifecycle
    - r-magrittr
    - r-patchwork
    - r-pheatmap >=1.0.12
    - r-plyr
    - r-purrr
    - r-readr
    - r-reshape2 >=1.4.2
    - r-rlang
    - r-rlist
    - r-scales
    - r-stringdist
    - r-stringr
    - r-tibble
    - r-tidyr
    - r-tidyselect
    - r-vctrs

test:
  commands:
    - $R -e "library('immunarch')"           # [not win]
    - "\"%R%\" -e \"library('immunarch')\""  # [win]

about:
  home: https://immunarch.com/
  dev_url: https://github.com/immunomind/immunarch
  license: Apache-2.0
  summary: "A comprehensive framework for bioinformatics exploratory analysis of bulk and single-cell T-cell receptor and antibody repertoires. It provides seamless data loading, analysis and visualisation for AIRR (Adaptive Immune Receptor Repertoire) data, both bulk immunosequencing (RepSeq) and single-cell sequencing
    (scRNAseq). It implements most of the widely used AIRR analysis methods, such as: clonality analysis, estimation of repertoire similarities in distribution of clonotypes and gene segments, repertoire diversity analysis, annotation of clonotypes using external immune receptor databases and clonotype tracking in vaccination
    and cancer studies. A successor to our previously published 'tcR' immunoinformatics package (Nazarov 2015) <doi:10.1186/s12859-015-0613-1>."
  license_family: APACHE
  license_file:
    - LICENSE-2.0.txt

extra:
  recipe-maintainers:
    - conda-forge/r
    - berombau
